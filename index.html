<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Temple Festival Announcement System</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f5f5f5;

      text-align: center;

      padding-top: 50px;
    }

    h1 {

      color: #6a1b9a;

      margin-bottom: 40px;
    }

    button {

      width: 280px;

      height: 90px;

      margin: 20px;

      font-size: 24px;

      border: none;

      border-radius: 12px;

      background: #6a1b9a;

      color: white;

      cursor: pointer;
    }

    button:hover {

      opacity: 0.9;
    }

    #status {

      margin-top: 30px;

      font-size: 20px;

      color: green;

      padding: 20px;
    }

  </style>

</head>

<body>

  <h1>Temple Festival Announcement System</h1>

  <button onclick="announceLast()">
    🔊 Announce Last
  </button>

  <button onclick="announceAll()">
    📢 Announce All
  </button>

  <div id="status">
    Ready for announcements...
  </div>

  <script>

    // ==========================================
    // GOOGLE SHEET PUBLISHED CSV URL
    // ==========================================

    const sheetUrl =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5V04qkI0VB032UjZvc74TOrNdrP2xpGc-iKSn3GEkHPZSqhRBrPaxYmilHtj8lemePSOeSEWt79Eh/pub?gid=1652293168&single=true&output=csv";



    // ==========================================
    // FETCH GOOGLE SHEET DATA
    // ==========================================

    async function fetchSheetData() {

      try {

        const response =
          await fetch(sheetUrl);

        const csv =
          await response.text();

        console.log(csv);

        const rows = csv
          .trim()
          .split("\n")
          .map(r => r.split(","));

        return rows;

      } catch (error) {

        console.error(error);

        updateStatus(
          "❌ Failed to fetch Google Sheet data"
        );

        return [];
      }
    }



    // ==========================================
    // UPDATE STATUS MESSAGE
    // ==========================================

    function updateStatus(message) {

      document.getElementById(
        "status"
      ).innerText = message;
    }



    // ==========================================
    // GET TELUGU VOICE
    // ==========================================

    function getTeluguVoice() {

      const voices =
        speechSynthesis.getVoices();

      console.log("Available Voices:", voices);

      // Try Telugu voice first
      let teluguVoice =
        voices.find(v =>
          v.lang.includes("te")
        );

      // Fallback to Indian English
      if (!teluguVoice) {

        teluguVoice =
          voices.find(v =>
            v.lang.includes("en-IN")
          );
      }

      // Final fallback
      if (!teluguVoice) {

        teluguVoice = voices[0];
      }

      return teluguVoice;
    }



    // ==========================================
    // SPEAK TELUGU MESSAGE
    // ==========================================

    function speakTelugu(text) {

      speechSynthesis.cancel();

      const utterance =
        new SpeechSynthesisUtterance();

      utterance.text = text;

      utterance.rate = 0.9;

      utterance.pitch = 1;

      utterance.volume = 1;

      const selectedVoice =
        getTeluguVoice();

      if (selectedVoice) {

        utterance.voice =
          selectedVoice;

        utterance.lang =
          selectedVoice.lang;
      }

      console.log(
        "Speaking:",
        text
      );

      updateStatus(
        "🔊 " + text
      );

      speechSynthesis.speak(
        utterance
      );
    }



    // ==========================================
    // ANNOUNCE LAST DONATION
    // ==========================================

    async function announceLast() {

      updateStatus(
        "Fetching latest donation..."
      );

      const rows =
        await fetchSheetData();

      if (rows.length <= 1) {

        updateStatus(
          "❌ No donation data found"
        );

        return;
      }

      // Last row
      const last =
        rows[rows.length - 1];

      const name =
        last[1]?.trim();

      const amount =
        last[2]?.trim();

      const purpose =
        last[3]?.trim();

      let message =
        `${name} గారు ${amount} రూపాయలు విరాళంగా ఇచ్చారు`;

      if (
        purpose &&
        purpose !== ""
      ) {

        message +=
          ` ${purpose} కోసం`;
      }

      speakTelugu(message);
    }



    // ==========================================
    // ANNOUNCE ALL DONATIONS
    // ==========================================

    async function announceAll() {

      updateStatus(
        "Fetching all donations..."
      );

      const rows =
        await fetchSheetData();

      if (rows.length <= 1) {

        updateStatus(
          "❌ No donation data found"
        );

        return;
      }

      // Skip header row
      for (
        let i = 1;
        i < rows.length;
        i++
      ) {

        const row =
          rows[i];

        const name =
          row[1]?.trim();

        const amount =
          row[2]?.trim();

        const purpose =
          row[3]?.trim();

        let message =
          `${name} గారు ${amount} రూపాయలు విరాళంగా ఇచ్చారు`;

        if (
          purpose &&
          purpose !== ""
        ) {

          message +=
            ` ${purpose} కోసం`;
        }

        speakTelugu(message);

        // Wait before next announcement
        await new Promise(
          resolve =>
            setTimeout(resolve, 7000)
        );
      }

      updateStatus(
        "✅ Completed all announcements"
      );
    }



    // ==========================================
    // LOAD VOICES
    // ==========================================

    speechSynthesis.onvoiceschanged =
      function () {

        console.log(
          "Voices Loaded:",
          speechSynthesis.getVoices()
        );
      };

  </script>

</body>

</html>

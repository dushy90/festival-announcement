<script>

const sheetUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5V04qkI0VB032UjZvc74TOrNdrP2xpGc-iKSn3GEkHPZSqhRBrPaxYmilHtj8lemePSOeSEWt79Eh/pub?gid=1652293168&single=true&output=csv";

async function fetchSheetData() {

  const response = await fetch(sheetUrl);

  const csv = await response.text();

  console.log(csv);

  const rows = csv
    .trim()
    .split("\n")
    .map(row => {

      return row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    });

  return rows;
}

function speakText(text) {

  speechSynthesis.cancel();

  const speech =
    new SpeechSynthesisUtterance(text);

  speech.lang = "te-IN";

  speech.rate = 0.9;

  speech.volume = 1;

  console.log("Speaking:", text);

  window.speechSynthesis.speak(speech);
}

async function announceLast() {

  const rows = await fetchSheetData();

  const last = rows[rows.length - 1];

  const name =
    last[1]?.replace(/"/g, "").trim();

  const amount =
    last[2]?.replace(/"/g, "").trim();

  const purpose =
    last[3]?.replace(/"/g, "").trim();

  let message =
    `${name} గారు ${amount} రూపాయలు విరాళంగా ఇచ్చారు`;

  if (purpose) {
    message += ` ${purpose} కోసం`;
  }

  speakText(message);
}

async function announceAll() {

  const rows = await fetchSheetData();

  for (let i = 1; i < rows.length; i++) {

    const row = rows[i];

    const name =
      row[1]?.replace(/"/g, "").trim();

    const amount =
      row[2]?.replace(/"/g, "").trim();

    const purpose =
      row[3]?.replace(/"/g, "").trim();

    let message =
      `${name} గారు ${amount} రూపాయలు విరాళంగా ఇచ్చారు`;

    if (purpose) {
      message += ` ${purpose} కోసం`;
    }

    speakText(message);

    await new Promise(resolve =>
      setTimeout(resolve, 7000)
    );
  }
}

</script>

<!DOCTYPE html>
<html>

<head>

  <title>Temple Festival Announcement System</title>

  <style>

    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 40px;
    }

    button {

      width: 260px;
      height: 90px;

      font-size: 26px;

      margin: 20px;

      border: none;

      border-radius: 12px;

      background: #6a1b9a;

      color: white;

      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>

</head>

<body>

<h1>Temple Festival Announcement System</h1>

<button onclick="announceLast()">
  Announce Last
</button>

<button onclick="announceAll()">
  Announce All
</button>

<script>

const sheetUrl =
"https://docs.google.com/spreadsheets/d/12lZQAB0sb5PkDO9mkVPLDDunzCAdGgEtofnXRpwCadU/export?format=csv";

async function fetchSheetData() {

  const response = await fetch(sheetUrl);

  const csv = await response.text();

  const rows = csv.trim()
    .split("\n")
    .map(r => r.split(","));

  return rows;
}

function speakText(text) {

  speechSynthesis.cancel();

  const speech =
    new SpeechSynthesisUtterance(text);

  speech.lang = "te-IN";

  speech.rate = 0.9;

  speech.volume = 1;

  window.speechSynthesis.speak(speech);
}

async function announceLast() {

  const rows = await fetchSheetData();

  const last = rows[rows.length - 1];

  const name = last[1];

  const amount = last[2];

  const purpose = last[3];

  let message =
    `${name} గారు ${amount} రూపాయలు విరాళంగా ఇచ్చారు`;

  if (purpose) {
    message += ` ${purpose} కోసం`;
  }

  speakText(message);
}

async function announceAll() {

  const rows = await fetchSheetData();

  for (let i = 1; i < rows.length; i++) {

    const row = rows[i];

    const name = row[1];

    const amount = row[2];

    const purpose = row[3];

    let message =
      `${name} గారు ${amount} రూపాయలు విరాళంగా ఇచ్చారు`;

    if (purpose) {
      message += ` ${purpose} కోసం`;
    }

    speakText(message);

    await new Promise(resolve =>
      setTimeout(resolve, 7000)
    );
  }
}

</script>

</body>

</html>
